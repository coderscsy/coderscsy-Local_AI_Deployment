<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Local AI Chat</title>
<style>
:root{--bg:#0a0a0c;--surface:#141418;--surface2:#1c1c22;--border:#2a2a32;--text:#e8e8ec;--text2:#8888a0;--accent:#6366f1;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden}

/* 侧边栏 */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .2s}
.sidebar.hidden{transform:translateX(-260px);position:absolute;z-index:20;height:100%}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-header h3{font-size:14px;font-weight:500}
.new-btn{background:var(--accent);color:white;border:none;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.new-btn:hover{opacity:.85}
.chat-list{flex:1;overflow-y:auto;padding:6px}
.chat-item{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:2px;font-size:13px;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:var(--surface2);color:var(--text)}
.chat-item .del{opacity:0;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px}
.chat-item:hover .del{opacity:1}
.chat-item .del:hover{color:#ef4444}
body.touch .chat-item .del{opacity:.65;font-size:20px;padding:2px 8px}   /* 触屏没有 hover：删除键常显、加大点按区 */
.chat-item-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.menu-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;display:none;padding:4px;flex-shrink:0}
.logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;flex-shrink:0}
.h-titles{flex-shrink:0}
.h-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-status{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:middle;margin-right:3px}
.dot.on{background:#22c55e}.dot.off{background:#ef4444}
.h-right{display:flex;gap:6px;align-items:center;flex:1;min-width:0;justify-content:flex-end}
select,.btn-s{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:8px;font-family:inherit;outline:none;max-width:140px}
select{flex-shrink:1;min-width:0}.btn-s{cursor:pointer;flex-shrink:0}.btn-s:hover{border-color:var(--text2)}
#ctxSel{max-width:76px;flex-shrink:0}

.chat{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;margin-bottom:14px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{margin-left:auto}.msg.ai{margin-right:auto}
.bubble{padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;border-bottom-right-radius:6px}
.msg.ai .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:6px}
.msg-time{font-size:10px;color:var(--text2);margin-top:3px;padding:0 4px}
.msg.user .msg-time{text-align:right}
.bubble img{max-width:100%;border-radius:8px;margin:8px 0;cursor:pointer;display:block}
.bubble a{color:#818cf8;text-decoration:underline;word-break:break-all}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,80%,100%{transform:scale(.4);opacity:.4}40%{transform:scale(1);opacity:1}}
.welcome{text-align:center;padding:50px 20px;color:var(--text2)}
.welcome-icon{width:50px;height:50px;border-radius:16px;margin:0 auto 14px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(99,102,241,.2)}
.welcome h2{color:var(--text);font-size:17px;font-weight:500;margin-bottom:4px}
.welcome p{font-size:13px;line-height:1.5}
.input-area{padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:9px 12px;border-radius:12px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:120px;line-height:1.5}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text2)}
.send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:12px;color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{transform:scale(.93)}.send-btn:disabled{opacity:.35}
.send-btn.stop{background:#ef4444}
.att-btn{width:40px;height:40px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.att-btn:active{transform:scale(.93)}
.img-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.img-preview .pv{position:relative}
.img-preview img{height:54px;border-radius:8px;display:block}
.img-preview .rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;font-size:12px;line-height:18px;text-align:center;cursor:pointer}
.bubble .up-img{max-width:200px;border-radius:8px;margin:2px 0 6px;display:block;cursor:pointer}

/* 消息底部操作栏 + 复制 */
.msg-foot{display:flex;align-items:center;gap:6px;margin-top:4px;padding:0 2px;min-height:16px}
.msg.user .msg-foot{justify-content:flex-end}
.msg-copy{background:none;border:none;color:var(--text2);cursor:pointer;padding:3px;border-radius:6px;display:inline-flex;align-items:center;opacity:0;transition:opacity .15s,background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.msg-copy:hover{background:var(--surface2);color:var(--text)}
.msg:hover .msg-copy{opacity:1}
@media(pointer:coarse){.msg-copy{opacity:.5}}
body.touch .msg-copy{opacity:.55}
.msg-time{font-size:10px;color:var(--text2)}
/* Markdown */
.msg.ai .bubble{white-space:normal}
.bubble p{margin:0 0 8px}.bubble p:last-child{margin-bottom:0}
.bubble h1,.bubble h2,.bubble h3{margin:10px 0 6px;line-height:1.3;font-weight:600}
.bubble h1{font-size:18px}.bubble h2{font-size:16px}.bubble h3{font-size:14.5px}
.bubble ul,.bubble ol{margin:6px 0;padding-left:20px}.bubble li{margin:2px 0}
.bubble blockquote{border-left:3px solid var(--border);margin:6px 0;padding:1px 0 1px 10px;color:var(--text2)}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.bubble strong{font-weight:600}.bubble em{font-style:italic}
.bubble code.inline{background:rgba(255,255,255,.09);padding:1px 5px;border-radius:5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.9em}
/* 代码块 */
.code-block{margin:8px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#0c0c11}
.code-head{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:#15151b;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2)}
.code-copy{background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.code-copy:hover{background:var(--surface2);color:var(--text)}
.code-block pre{margin:0;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.code-block code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.55;white-space:pre}
/* 复制提示 */
#toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(8px);background:#26262e;color:var(--text);padding:7px 16px;border-radius:18px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.sidebar{width:240px}.sidebar.hidden{transform:translateX(-240px)}.menu-btn{display:block;font-size:18px}.header{padding:6px 10px}.header-left{gap:6px}.logo{width:26px;height:26px;font-size:12px}.h-title{font-size:13px;line-height:1.2}.h-status{font-size:10px;line-height:1.2}select,.btn-s{max-width:110px}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>💬 对话记录</h3>
    <button class="new-btn" onclick="newChat()">+ 新对话</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main">
  <div class="header">
    <div class="header-left">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="logo">AI</div>
      <div class="h-titles">
        <div class="h-title">Local AI</div>
        <div class="h-status" id="status"><span class="dot off"></span>检测中</div>
      </div>
    </div>
    <div class="h-right">
      <select id="modelSel"></select>
      <select id="ctxSel" title="上下文长度（更改后下一条消息按此重载模型，需 Mac 装好 lms）">
        <option value="">上下文</option>
        <option value="4096">4K</option>
        <option value="8192">8K</option>
        <option value="16384">16K</option>
        <option value="32768">32K</option>
      </select>
      <button class="btn-s" onclick="setApi()">⚙</button>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="img-preview" id="imgPreview"></div>
    <div class="input-row">
      <button class="att-btn" id="attBtn" onclick="attachImg()" title="图片 / 拍照（需视觉模型）">＋</button>
      <input type="file" id="fileIn" accept="image/*" style="display:none">
      <textarea id="input" rows="1" placeholder="输入消息...  含'画/生成'自动生图" oninput="autoH(this)" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="onSend()">↑</button>
    </div>
  </div>
</div>

<script>
let API = localStorage.getItem('api_host') || window.location.origin;

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const modelSel = document.getElementById('modelSel');
const ctxSel = document.getElementById('ctxSel');
const fileIn = document.getElementById('fileIn');
const imgPreview = document.getElementById('imgPreview');
const chatList = document.getElementById('chatList');
const sidebarEl = document.getElementById('sidebar');

let generating = false;
let abortCtrl = null;
let currentChatId = null;
let CHATS = {};                      // 内存中的会话数据（唯一可信源），localStorage 仅作持久化
const isTouch = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
let storageWarned = false;

// ===== 复制（兼容 HTTP / 非安全上下文——手机经 Tailscale 走的是 http，navigator.clipboard 不可用）=====
const COPY_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const CHECK_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

async function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); return true; }
  } catch(e) {}
  try {                                   // 回退：http 用 execCommand
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { ta.setSelectionRange(0, text.length); } catch(e) {}
    const ok = document.execCommand('copy'); ta.remove();
    return ok;
  } catch(e) { return false; }
}
function toast(m) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = m; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 1400);
}
function flashCopy(btn, ok) {
  if (!btn.dataset.orig) btn.dataset.orig = btn.innerHTML;
  btn.innerHTML = btn.classList.contains('code-copy') ? (ok ? '✓ 已复制' : '✗ 失败') : (ok ? CHECK_SVG : '✗');
  toast(ok ? '已复制' : '复制失败，请长按手动选择');
  clearTimeout(btn._t); btn._t = setTimeout(() => { btn.innerHTML = btn.dataset.orig; }, 1300);
}
// 事件委托：代码块复制 / 单条消息复制（survives innerHTML 重渲染）
chatEl.addEventListener('click', async (e) => {
  const cc = e.target.closest('.code-copy');
  if (cc) { e.stopPropagation(); const code = cc.closest('.code-block') && cc.closest('.code-block').querySelector('code'); flashCopy(cc, await copyText(code ? code.textContent : '')); return; }
  const mc = e.target.closest('.msg-copy');
  if (mc) { e.stopPropagation(); const msg = mc.closest('.msg'); flashCopy(mc, await copyText((msg && msg.__raw) || '')); return; }
});

// ===== 存储（内存为主，localStorage 仅持久化）=====
function loadChats() { return CHATS; }
function saveChats(chats) {
  CHATS = chats;
  try { localStorage.setItem('chats', JSON.stringify(CHATS)); }
  catch(e) { showStorageWarn(); }
}
function loadFromStorage() {
  try { CHATS = JSON.parse(localStorage.getItem('chats') || '{}'); } catch(e) { CHATS = {}; }
}
function showStorageWarn() {
  if (storageWarned) return; storageWarned = true;
  const b = document.createElement('div');
  b.textContent = '⚠️ 当前浏览器未能保存记录（可能是隐私模式或 App 内置浏览器）。换普通浏览器标签页打开即可保存。';
  b.style.cssText = 'background:#7c2d12;color:#fed7aa;padding:8px 12px;font-size:12px;line-height:1.4;text-align:center';
  const main = document.querySelector('.main');
  if (main) main.prepend(b);
}
function getCurrentMessages() {
  if (!currentChatId) return [];
  const chats = loadChats();
  return (chats[currentChatId] && chats[currentChatId].messages) || [];
}
function saveMessage(role, content) {
  if (!currentChatId) return;
  const chats = loadChats();
  if (!chats[currentChatId]) {
    chats[currentChatId] = {title: '新对话', messages: [], created: Date.now()};
  }
  chats[currentChatId].messages.push({role, content});
  // 用第一条用户消息做标题
  if (role === 'user' && chats[currentChatId].title === '新对话') {
    const t = (typeof content === 'string' ? content : contentText(content)) || '[图片]';
    chats[currentChatId].title = t.substring(0, 30);
  }
  chats[currentChatId].updated = Date.now();
  saveChats(chats);
  renderChatList();
}

// ===== 侧边栏 =====
function renderChatList() {
  const chats = loadChats();
  const sorted = Object.entries(chats).sort((a,b) => (b[1].updated||0) - (a[1].updated||0));
  chatList.innerHTML = '';
  sorted.forEach(([id, chat]) => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (id === currentChatId ? ' active' : '');
    div.innerHTML = `<span class="chat-item-title">${esc(chat.title || '新对话')}</span><span class="del" onclick="event.stopPropagation();deleteChat('${id}')">×</span>`;
    div.onclick = () => switchChat(id);
    chatList.appendChild(div);
  });
}

function newChat() {
  // 当前会话还是空的就直接复用，避免堆积一堆空"新对话"
  if (currentChatId && CHATS[currentChatId] && (CHATS[currentChatId].messages || []).length === 0) {
    switchChat(currentChatId);
    return;
  }
  const id = 'chat_' + Date.now();
  const chats = loadChats();
  chats[id] = {title: '新对话', messages: [], created: Date.now(), updated: Date.now()};
  saveChats(chats);
  switchChat(id);
}

function switchChat(id) {
  currentChatId = id;
  try { localStorage.setItem('currentChat', id); } catch(e) {}
  renderChatList();
  renderMessages();
  if (window.innerWidth <= 600) sidebarEl.classList.add('hidden');
}

function deleteChat(id) {
  if (!confirm('删除这个对话？删除后无法恢复。')) return;
  const chats = loadChats();
  delete chats[id];
  saveChats(chats);
  if (id === currentChatId) {
    // 删除当前会话后展示一个完全空白的会话（欢迎页），而不是跳到别的会话；其它会话仍在侧栏，发消息时再新建
    currentChatId = null;
    try { localStorage.removeItem('currentChat'); } catch(e) {}
    renderChatList();
    renderMessages();
  } else {
    renderChatList();
  }
}

function toggleSidebar() {
  sidebarEl.classList.toggle('hidden');
}

// ===== 渲染 =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function autoH(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function onKey(e) {
  // 手机/触屏：回车换行，靠发送按钮发送；桌面：回车发送，Shift+回车换行
  if (e.key === 'Enter' && !e.shiftKey && !isTouch) { e.preventDefault(); send(); }
}
function now() { return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); }
function scrollEnd() { requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight); }

// 轻量 Markdown 渲染（自带、无外部依赖；先转义再套规则，杜绝 XSS）
function renderContent(text) {
  const escH = (x) => x.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // 1) 抽出 ``` 代码块占位，避免内部被其它规则破坏
  const codes = [];
  let s = String(text).replace(/```([^\n`]*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    codes.push({ lang: (lang || '').trim(), code: code.replace(/\n+$/, '') });
    return '￼' + (codes.length - 1) + '￼';
  });
  // 行内格式化
  const inline = (t) => {
    t = escH(t);
    t = t.replace(/`([^`]+)`/g, (m, c) => '<code class="inline">' + c + '</code>');
    t = t.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s"']+)\)/g, '<img loading="lazy" src="$2" alt="$1" onclick="window.open(this.src)">');
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s"']+)\)/g, '<a href="$2" target="_blank">$1</a>');
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    t = t.replace(/(^|[\s(])(https?:\/\/[^\s<)"']+)/g, (m, pre, u) =>
      /\.(png|jpe?g|webp|gif)$/i.test(u)
        ? pre + '<img loading="lazy" src="' + u + '" onclick="window.open(this.src)"><a href="' + u + '" target="_blank">📥 下载原图</a>'
        : pre + '<a href="' + u + '" target="_blank">' + u + '</a>');
    return t;
  };
  // 2) 块级
  const lines = s.split('\n');
  let html = '', para = [], i = 0, m;
  const flush = () => { if (para.length) { html += '<p>' + para.map(inline).join('<br>') + '</p>'; para = []; } };
  while (i < lines.length) {
    const ln = lines[i], ph = ln.match(/^￼(\d+)￼\s*$/);
    if (ph) { flush(); const c = codes[+ph[1]];
      html += '<div class="code-block"><div class="code-head"><span>' + escH(c.lang || 'code') + '</span><button class="code-copy" title="复制代码">' + COPY_SVG + '<span>复制</span></button></div><pre><code>' + escH(c.code) + '</code></pre></div>';
      i++; continue; }
    if (/^\s*$/.test(ln)) { flush(); i++; continue; }
    if (m = ln.match(/^(#{1,3})\s+(.*)$/)) { flush(); const lv = m[1].length; html += '<h' + lv + '>' + inline(m[2]) + '</h' + lv + '>'; i++; continue; }
    if (/^\s*([-*])\s+/.test(ln)) { flush(); html += '<ul>'; while (i < lines.length && /^\s*([-*])\s+/.test(lines[i])) { html += '<li>' + inline(lines[i].replace(/^\s*[-*]\s+/, '')) + '</li>'; i++; } html += '</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(ln)) { flush(); html += '<ol>'; while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { html += '<li>' + inline(lines[i].replace(/^\s*\d+\.\s+/, '')) + '</li>'; i++; } html += '</ol>'; continue; }
    if (/^\s*>\s?/.test(ln)) { flush(); const q = []; while (i < lines.length && /^\s*>\s?/.test(lines[i])) { q.push(lines[i].replace(/^\s*>\s?/, '')); i++; } html += '<blockquote>' + q.map(inline).join('<br>') + '</blockquote>'; continue; }
    if (/^\s*([-*_])\1{2,}\s*$/.test(ln)) { flush(); html += '<hr>'; i++; continue; }
    para.push(ln); i++;
  }
  flush();
  return html;
}

// 推理模型会把思考过程放进 <think>…</think>：显示与写入上下文时都去掉它，
// 避免思考文本污染对话历史（导致下一轮答非所问 / 重复上一题），也用于判断"是否还在思考"
function splitThink(t) {
  let s = t.replace(/<think>[\s\S]*?<\/think>/gi, '');
  if (/<think>/i.test(s)) s = s.replace(/<think>[\s\S]*$/i, '');   // 仍在思考（只有<think>没有</think>）
  return { text: s.trim() };
}

function msgFoot(withTime) {
  return '<div class="msg-foot"><button class="msg-copy" title="复制" aria-label="复制">' + COPY_SVG + '</button>'
       + (withTime ? '<span class="msg-time">' + now() + '</span>' : '') + '</div>';
}
// 消息内容可能是字符串，或视觉消息的数组 [{type:'text'...},{type:'image_url'...}]
function contentText(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.filter(p => p && p.type === 'text').map(p => p.text || '').join(' ');
  return '';
}
function contentHTML(role, content) {
  let imgs = '';
  if (Array.isArray(content)) content.forEach(p => {
    if (p && p.type === 'image_url') { const u = p.image_url && (p.image_url.url || p.image_url); if (u) imgs += '<img class="up-img" loading="lazy" src="' + u + '" onclick="window.open(this.src)">'; }
  });
  const text = contentText(content);
  return imgs + (role === 'user' ? esc(text) : renderContent(text));
}
function buildMsg(role, content, withTime) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  div.__raw = contentText(content);                    // 复制按钮用：取文本部分
  div.innerHTML = '<div class="bubble">' + contentHTML(role, content) + '</div>' + msgFoot(withTime);
  return div;
}

function renderMessages() {
  const msgs = getCurrentMessages();
  if (msgs.length === 0) {
    chatEl.innerHTML = '<div class="welcome"><div class="welcome-icon">🤖</div><h2>Local AI Chat</h2><p>Mac Mini 本地模型<br>支持对话 + 图片生成</p></div>';
    return;
  }
  chatEl.innerHTML = '';
  msgs.forEach(m => chatEl.appendChild(buildMsg(m.role, m.content, false)));
  scrollEnd();
}

// ===== 状态检测 =====
async function checkStatus() {
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), 5000);
    const r = await fetch(API + '/v1/models', {signal: c.signal});
    clearTimeout(t);
    if (!r.ok) throw 0;
    const data = await r.json();
    const models = (data.data || []).filter(m => !m.id.includes('embed'));
    const ids = models.map(m => m.id);
    // 只有模型列表变化时才重建下拉框——否则每 15 秒重建会打断手机上正在进行的选择，导致"切换不了"
    if (ids.join('|') !== [...modelSel.options].map(o => o.value).join('|')) {
      const saved = localStorage.getItem('model');
      const want = (saved && ids.includes(saved)) ? saved
                 : (ids.includes(modelSel.value) ? modelSel.value : ids[0]);
      modelSel.innerHTML = '';
      models.forEach(m => {
        const o = document.createElement('option');
        o.value = m.id;
        o.textContent = m.id.split('/').pop().substring(0, 22);
        modelSel.appendChild(o);
      });
      if (want) modelSel.value = want;
    }
    statusEl.innerHTML = '<span class="dot on"></span>已连接';
  } catch(e) {
    statusEl.innerHTML = '<span class="dot off"></span>未连接';
  }
}
checkStatus();
setInterval(checkStatus, 15000);
modelSel.addEventListener('change', () => { try { localStorage.setItem('model', modelSel.value); } catch(e) {} });   // 记住所选模型
ctxSel.value = localStorage.getItem('ctx') || '';                                                                    // 恢复上下文长度选择
ctxSel.addEventListener('change', () => { try { localStorage.setItem('ctx', ctxSel.value); } catch(e) {} });

// ===== 图片上传 / 拍照（发给视觉模型）=====
let pendingImg = null;
function attachImg() { fileIn.click(); }                 // 手机上会弹出"拍照/相册"选项
fileIn.onchange = () => {
  const f = fileIn.files && fileIn.files[0]; fileIn.value = '';
  if (!f) return;
  const fr = new FileReader();
  fr.onload = () => downscaleImg(fr.result, 1024, (u) => { pendingImg = u; renderImgPreview(); });
  fr.readAsDataURL(f);
};
function downscaleImg(dataUrl, max, cb) {                 // 压到最长边 max，避免几 MB 的原图拖慢请求
  const im = new Image();
  im.onload = () => {
    let w = im.width, h = im.height;
    if (Math.max(w, h) > max) { const s = max / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    try { c.getContext('2d').drawImage(im, 0, 0, w, h); cb(c.toDataURL('image/jpeg', 0.85)); }
    catch(e) { cb(dataUrl); }
  };
  im.onerror = () => cb(dataUrl);
  im.src = dataUrl;
}
function renderImgPreview() {
  imgPreview.innerHTML = pendingImg
    ? '<div class="pv"><img src="' + pendingImg + '"><span class="rm" onclick="clearPendingImg()">×</span></div>' : '';
}
function clearPendingImg() { pendingImg = null; renderImgPreview(); }

function setApi() {
  const v = prompt('API 地址:', API);
  if (v && v.trim()) {
    API = v.trim().replace(/\/+$/, '');
    localStorage.setItem('api_host', API);
    checkStatus();
  }
}

// ===== 发送 =====
// 发送按钮：生成中点击=终止；否则=发送
function onSend() { if (generating) { if (abortCtrl) abortCtrl.abort(); } else send(); }
function setSendStop(on) { sendBtn.innerHTML = on ? '■' : '↑'; sendBtn.classList.toggle('stop', on); sendBtn.title = on ? '终止生成' : '发送'; }

// 渲染并收尾一条 AI 消息（正常结束 / 被截断 / 被终止 共用）
function finishAi(aiDiv, bubble, fullText, finishReason, aborted) {
  if (!aiDiv || !bubble) return;
  const clean = splitThink(fullText).text;
  const shown = clean || fullText.trim();   // 剥掉 <think> 后为空（多为"思考中被截断"）→ 原样显示，避免前端空白/看不全
  if (shown) {
    bubble.innerHTML = renderContent(shown);
    if (aborted)
      bubble.insertAdjacentHTML('beforeend', '<div style="color:#f59e0b;font-size:12px;margin-top:6px">⏹ 已终止生成（本段不计入上下文）</div>');
    else if (finishReason === 'length')
      bubble.insertAdjacentHTML('beforeend', '<div style="color:#f59e0b;font-size:12px;margin-top:6px">⚠️ 已达长度/上下文上限，回复被截断——请在 LM Studio 调大 Context Length</div>');
    aiDiv.__raw = shown;
    aiDiv.insertAdjacentHTML('beforeend', msgFoot(true));
    if (clean && !aborted) saveMessage('assistant', clean);   // 干净正文才写入上下文；终止的半截内容不写入，避免污染下一轮
  } else {
    bubble.innerHTML = aborted ? '⏹ 已终止' : '⚠️ 模型未返回任何内容';
  }
  scrollEnd();
}

async function send() {
  const text = inputEl.value.trim();
  if ((!text && !pendingImg) || generating) return;
  if (!modelSel.value) { toast('模型未就绪：请确认 LM Studio 已加载模型'); return; }

  generating = true;
  abortCtrl = new AbortController();
  setSendStop(true);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  const img = pendingImg; pendingImg = null; renderImgPreview();
  // 带图片时用 OpenAI 视觉格式（需 LM Studio 加载视觉模型）
  const content = img ? [{type: 'text', text: text}, {type: 'image_url', image_url: {url: img}}] : text;

  // 如果没有当前对话，创建一个
  if (!currentChatId) newChat();

  // 用户消息
  const userDiv = buildMsg('user', content, true);
  const w = chatEl.querySelector('.welcome');
  if (w) w.remove();
  chatEl.appendChild(userDiv);
  scrollEnd();
  saveMessage('user', content);

  // typing
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai';
  typingDiv.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(typingDiv);
  scrollEnd();

  // 兜底清洗（不改存储，只清理本次要发送的上下文）：①空内容 assistant；②被中途终止残留的「图片生成」半截文案
  // （以占位语开头、又没"✅ 生成完成"标记）——避免脏上下文导致模型回空，也能自愈旧会话里已存的污染
  const allMsgs = getCurrentMessages().filter(m => {
    if (m.role !== 'assistant') return true;
    const t = (contentText(m.content) || '').trim();
    if (!t) return false;
    if (t.startsWith('🎨 正在生成图片') && !t.includes('✅ 生成完成')) return false;
    return true;
  });

  // #5：注入一条 system 指令——让模型把"可用于绘画的提示词"单独放进 ``` 代码块，
  // 这样就复用代码块自带的「复制」按钮，可一键复制（图片生成路径已在用这套渲染）。
  const sendMsgs = [
    {role: 'system', content: '当你输出可用于 AI 绘画的提示词(prompt)时，请把该提示词单独放进一个 ``` 代码块里，方便用户一键复制；其余说明文字照常输出即可。'},
    ...allMsgs
  ];

  let aiDiv = null, bubble = null, fullText = '', finishReason = null;
  try {
    const res = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      signal: abortCtrl.signal,
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer lm-studio'},
      body: JSON.stringify({model: modelSel.value, messages: sendMsgs, temperature: 0.7, stream: true, ...(ctxSel.value ? {context_length: +ctxSel.value} : {})})
    });
    if (!res.ok) {
      let detail = '';
      try { detail = (await res.text()).slice(0, 400); } catch(e) {}
      throw new Error('HTTP ' + res.status + (detail ? ' — ' + detail : ''));
    }

    typingDiv.remove();
    aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    aiDiv.innerHTML = '<div class="bubble"></div>';
    chatEl.appendChild(aiDiv);
    bubble = aiDiv.querySelector('.bubble');
    const TYPING = '<div class="typing"><span></span><span></span><span></span></div>';
    bubble.innerHTML = TYPING;          // 收到正文前一直显示等待动画（含模型"思考"阶段）
    scrollEnd();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', streamDone = false;

    while (!streamDone) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t || !t.startsWith('data: ')) continue;
        const d = t.slice(6);
        if (d === '[DONE]') { streamDone = true; break; }  // 收到结束标记立即停止，不再傻等连接关闭——否则会卡死，下一条发不出去、要刷新页面
        try {
          const j = JSON.parse(d);
          const ch0 = j.choices && j.choices[0];
          if (ch0 && ch0.finish_reason) finishReason = ch0.finish_reason;   // length=被长度/上下文截断
          const delta = ch0 && ch0.delta && ch0.delta.content;
          if (delta) {
            fullText += delta;
            const cut = splitThink(fullText);
            bubble.innerHTML = cut.text ? renderContent(cut.text) : TYPING;  // 仍在 <think> 中则继续显示等待动画
            scrollEnd();
          }
        } catch(e) {}
      }
    }
    try { await reader.cancel(); } catch(e) {}   // 主动释放可能仍挂着的连接
    finishAi(aiDiv, bubble, fullText, finishReason, false);
  } catch(err) {
    typingDiv.remove();
    if (err && err.name === 'AbortError') {
      finishAi(aiDiv, bubble, fullText, finishReason, true);   // 用户点了终止：保留已生成的部分
    } else {
      const errDiv = document.createElement('div');
      errDiv.className = 'msg ai';
      errDiv.innerHTML = '<div class="bubble">⚠️ ' + esc(err.message) + '</div>';
      chatEl.appendChild(errDiv);
    }
  } finally {
    // 无论成功/出错/终止，都必须复位，否则 generating 卡在 true 会导致后续永远发不出
    generating = false;
    abortCtrl = null;
    setSendStop(false);
    if (!isTouch) inputEl.focus();   // 手机端不自动聚焦，避免每次回复后又弹出键盘
  }
}

// ===== 初始化 =====
(function init() {
  if (isTouch) document.body.classList.add('touch');   // 触屏设备：复制按钮常显，便于点按
  loadFromStorage();
  const chats = loadChats();
  const saved = localStorage.getItem('currentChat');
  if (saved && chats[saved]) {
    currentChatId = saved;
  } else if (Object.keys(chats).length > 0) {
    currentChatId = Object.keys(chats)[0];
  } else {
    newChat();
  }
  renderChatList();
  renderMessages();
  if (window.innerWidth <= 600) sidebarEl.classList.add('hidden');

  // 移动端软键盘适配：iOS Safari 不支持 viewport 的 interactive-widget、100dvh 也不随键盘收缩，
  // 底部输入栏会被键盘盖住。用 visualViewport 把 body 高度实时设为可视高度，让输入栏顶在键盘上方。
  // Android(Chrome) 已由 interactive-widget=resizes-content 处理，这里幂等、无副作用。
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const fitKeyboard = () => {
      document.body.style.height = vv.height + 'px';
      if (vv.offsetTop) window.scrollTo(0, 0);   // iOS 键盘把布局视口顶上去时复位，避免顶部留白
    };
    vv.addEventListener('resize', fitKeyboard);
    vv.addEventListener('scroll', fitKeyboard);
    fitKeyboard();
  }
})();
</script>
